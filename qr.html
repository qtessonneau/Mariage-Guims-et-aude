<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code — Quiz de Mariage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/qr.css">
</head>
<body class="qr-page">
  <div class="petals" aria-hidden="true"></div>

  <main class="qr-container">
    <div class="qr-card">
      <p class="eyebrow">Quiz de Mariage</p>
      <h1 id="qr-couple-names">Aude & Guims</h1>
      <p class="qr-instruction">Scannez le QR code avec votre téléphone<br>pour rejoindre le quiz !</p>

      <div id="qr-code" class="qr-code-wrap" aria-label="QR code du quiz"></div>

      <p class="qr-url" id="qr-url"></p>

      <div class="qr-actions no-print">
        <button type="button" class="btn btn-primary" id="btn-print">Imprimer / PDF</button>
        <button type="button" class="btn btn-secondary" id="btn-copy">Copier le lien</button>
        <a href="index.html" class="btn btn-secondary">Retour au quiz</a>
      </div>

      <p class="qr-copy-feedback no-print" id="copy-feedback" hidden>Lien copié !</p>
    </div>
  </main>

  <script type="module">
    import { COUPLE_NAMES } from "./js/site-config.js";
    import { renderQrCode, copyQuizUrl } from "./js/qrcode-helper.js";

    document.getElementById("qr-couple-names").textContent = COUPLE_NAMES;

    const url = await renderQrCode(document.getElementById("qr-code"), 320);
    document.getElementById("qr-url").textContent = url;

    document.getElementById("btn-print").addEventListener("click", () => window.print());
    document.getElementById("btn-copy").addEventListener("click", async () => {
      await copyQuizUrl();
      const feedback = document.getElementById("copy-feedback");
      feedback.hidden = false;
      setTimeout(() => { feedback.hidden = true; }, 2000);
    });
  </script>
</body>
</html>
